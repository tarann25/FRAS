<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRAS - Teacher Dashboard</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #64748b;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --success: #22c55e;
            --danger: #ef4444;
        }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg-color); 
            color: var(--text-main);
        }
        nav { 
            background-color: #1e293b; 
            padding: 1rem 2rem; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-brand {
            color: white;
            font-size: 1.25rem;
            font-weight: bold;
            text-decoration: none;
        }
        .nav-links a { 
            color: #cbd5e1; 
            text-decoration: none; 
            margin-left: 20px; 
            font-weight: 500; 
            transition: color 0.2s;
        }
        .nav-links a:hover { color: white; }
        .container { 
            max-width: 1000px; 
            margin: 2rem auto; 
            padding: 2rem; 
            background: var(--card-bg); 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); 
        }
        h1, h2, h3 { color: var(--text-main); margin-top: 0; }
        p { color: var(--text-muted); line-height: 1.6; }
        .btn { 
            display: inline-block; 
            padding: 10px 20px; 
            background-color: var(--primary); 
            color: white; 
            text-decoration: none; 
            border-radius: 6px; 
            font-weight: 500;
            border: none; 
            cursor: pointer; 
            transition: background-color 0.2s;
        }
        .btn:hover { background-color: var(--primary-hover); }
        .btn-success { background-color: var(--success); }
        .btn-success:hover { background-color: #16a34a; }
        .btn-secondary { background-color: var(--secondary); }
        .btn-secondary:hover { background-color: #475569; }
        .btn-large { padding: 16px 32px; font-size: 1.1rem; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f1f5f9; font-weight: 600; color: var(--text-muted); }
        
        .alert { padding: 15px; margin-bottom: 20px; border-radius: 6px; font-weight: 500; }
        .alert-success { color: #166534; background-color: #dcfce7; border: 1px solid #bbf7d0; }
        .alert-error { color: #991b1b; background-color: #fee2e2; border: 1px solid #fecaca; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-main); }
        .form-group input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            font-family: inherit;
            box-sizing: border-box;
        }
        .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
    </style>
</head>
<body>
    <nav>
        <a href="{{ url_for('index') }}" class="nav-brand">FRAS - Teacher Dashboard</a>
        <div class="nav-links">
            <a href="{{ url_for('register_batch') }}">Register New Batch</a>
            <a href="{{ url_for('mark_attendance') }}">Mark Attendance</a>
        </div>
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
