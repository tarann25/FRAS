{% extends "base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 0 auto;">
    <h2>Create Teacher Account</h2>
    <p>Register a new account to manage your classes securely.</p>

    <form method="POST" style="margin-top: 30px;">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required placeholder="e.g. Prof. Jane Doe">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6">
            <small style="color: #64748b;">Must be at least 6 characters.</small>
        </div>
        <button type="submit" class="btn btn-success" style="width: 100%;">Create Account</button>
    </form>
    
    <p style="text-align: center; margin-top: 20px;">
        Already have an account? <a href="{{ url_for('login') }}">Log In</a>
    </p>
</div>
{% endblock %}
