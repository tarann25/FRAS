{% extends "base.html" %}
{% block content %}
<div style="text-align: center; padding: 40px 0;">
    <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Welcome to FRAS</h1>
    <p style="font-size: 1.2rem; max-width: 600px; margin: 0 auto 40px auto;">
        Manage your class attendance automatically using Facial Recognition. Get started by creating a new batch or mark attendance for an existing one.
    </p>

    <div style="display: flex; justify-content: center; gap: 20px;">
        <a href="{{ url_for('register_batch') }}" class="btn btn-large" style="width: 250px;">
            <div style="font-size: 1.5rem; margin-bottom: 10px;">📝</div>
            Register a new batch
        </a>
        <a href="{{ url_for('mark_attendance') }}" class="btn btn-large btn-success" style="width: 250px;">
            <div style="font-size: 1.5rem; margin-bottom: 10px;">📸</div>
            Mark attendance for existing batch
        </a>
    </div>
</div>
{% endblock %}
